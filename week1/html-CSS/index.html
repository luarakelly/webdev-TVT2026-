<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Introduction to HTML and CSS</title>
  <link rel="stylesheet" type="text/css" href="index.css">
</head>

<body>

  <!-- Heading -->
  <h1>Introduction to HTML and CSS</h1>

  <!-- Paragraph -->
  <p>I'm learning how to build web pages!</p>

  <!-- Link -->
  <p>
    Visit 
    <a href="https://www.w3schools.com">W3Schools</a>
    to learn more about HTML.
  </p>

  <!-- Image -->
  <img src="https://www.w3schools.com/html/img_girl.jpg" alt="Example image" width="200">

  <!-- Table -->
  <h2>My Table</h2>
  <table>
    <tr>
      <th>Name</th>
      <th>Age</th>
    </tr>
    <tr>
      <td>Luara</td>
      <td>29</td>
    </tr>
    <tr>
      <td>Mayara</td>
      <td>34</td>
    </tr>
  </table>

  <!-- List -->
  <h2>My Favorite Foods</h2>
  <ul>
    <li>Poke salad</li>
    <li>Home made burger</li>
    <li>Grilled chicken</li>
  </ul>

</body>
</html>
